<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DisasterSight — Sign In</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --bg: #0a0c0f;
        --surface: #111418;
        --border: #1e2530;
        --border-bright: #2d3a4a;
        --text: #e4eaf2;
        --text-muted: #5a6a7e;
        --text-dim: #8a9ab0;
        --accent: #ff4e1a;
        --accent-dim: rgba(255, 78, 26, 0.12);
        --accent-glow: rgba(255, 78, 26, 0.3);
        --blue: #1e8fff;
        --blue-dim: rgba(30, 143, 255, 0.1);
        --mono: 'Space Mono', monospace;
        --sans: 'IBM Plex Sans', sans-serif;
      }

      html, body {
        height: 100%;
        background: var(--bg);
        color: var(--text);
        font-family: var(--sans);
        overflow: hidden;
      }

      /* Animated grid background */
      .bg-grid {
        position: fixed;
        inset: 0;
        background-image:
          linear-gradient(rgba(30, 143, 255, 0.04) 1px, transparent 1px),
          linear-gradient(90deg, rgba(30, 143, 255, 0.04) 1px, transparent 1px);
        background-size: 40px 40px;
        mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 30%, transparent 100%);
        animation: gridShift 20s linear infinite;
      }

      @keyframes gridShift {
        0% { background-position: 0 0; }
        100% { background-position: 40px 40px; }
      }

      /* Scan line overlay */
      .scanlines {
        position: fixed;
        inset: 0;
        background: repeating-linear-gradient(
          0deg,
          transparent,
          transparent 2px,
          rgba(0,0,0,0.08) 2px,
          rgba(0,0,0,0.08) 4px
        );
        pointer-events: none;
        z-index: 1;
      }

      /* Corner decorations */
      .corner {
        position: fixed;
        width: 80px;
        height: 80px;
        z-index: 2;
      }
      .corner::before, .corner::after {
        content: '';
        position: absolute;
        background: var(--accent);
        opacity: 0.6;
      }
      .corner.tl { top: 24px; left: 24px; }
      .corner.tl::before { top: 0; left: 0; width: 2px; height: 40px; }
      .corner.tl::after  { top: 0; left: 0; width: 40px; height: 2px; }
      .corner.tr { top: 24px; right: 24px; }
      .corner.tr::before { top: 0; right: 0; width: 2px; height: 40px; }
      .corner.tr::after  { top: 0; right: 0; width: 40px; height: 2px; }
      .corner.bl { bottom: 24px; left: 24px; }
      .corner.bl::before { bottom: 0; left: 0; width: 2px; height: 40px; }
      .corner.bl::after  { bottom: 0; left: 0; width: 40px; height: 2px; }
      .corner.br { bottom: 24px; right: 24px; }
      .corner.br::before { bottom: 0; right: 0; width: 2px; height: 40px; }
      .corner.br::after  { bottom: 0; right: 0; width: 40px; height: 2px; }

      /* Main layout */
      .page {
        position: relative;
        z-index: 5;
        height: 100vh;
        display: grid;
        grid-template-columns: 1fr;
        grid-template-rows: 1fr 48px;
        padding: 0;
      }

      /* Center card */
      .center-card {
        grid-column: 1;
        grid-row: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 24px;
        position: relative;
      }

      .card {
        width: 100%;
        max-width: 420px;
      }

      .card {
        background: var(--surface);
        border: 1px solid var(--border-bright);
        position: relative;
        overflow: hidden;
        opacity: 0;
        animation: fadeUp 0.5s ease 0.1s forwards;
      }

      .card::before {
        content: '';
        position: absolute;
        top: 0; left: 0; right: 0;
        height: 2px;
        background: linear-gradient(90deg, transparent, var(--accent), transparent);
      }

      .card-body {
        padding: 28px 36px 32px;
      }

      .field {
        margin-bottom: 18px;
      }

      .field label {
        display: block;
        font-family: var(--mono);
        font-size: 9px;
        color: var(--text-muted);
        letter-spacing: 0.16em;
        text-transform: uppercase;
        margin-bottom: 8px;
      }

      .input-wrap {
        position: relative;
      }

      .input-wrap svg {
        position: absolute;
        left: 14px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--text-muted);
        pointer-events: none;
        transition: color 0.2s;
      }

      input {
        width: 100%;
        background: var(--bg);
        border: 1px solid var(--border-bright);
        color: var(--text);
        font-family: var(--mono);
        font-size: 12px;
        letter-spacing: 0.05em;
        padding: 12px 14px 12px 40px;
        outline: none;
        transition: border-color 0.2s, box-shadow 0.2s;
        -webkit-appearance: none;
      }

      input::placeholder {
        color: var(--text-muted);
        font-family: var(--mono);
        font-size: 11px;
      }

      input:focus {
        border-color: var(--blue);
        box-shadow: 0 0 0 3px var(--blue-dim);
      }

      input:focus + svg,
      .input-wrap:focus-within svg {
        color: var(--blue);
      }

      /* Reorder icon so it shows above input via z-index trick */
      .input-wrap input { position: relative; z-index: 1; }
      .input-wrap svg { z-index: 2; }

      .field-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 8px;
      }

      .field-row label {
        margin-bottom: 0;
      }

      .forgot {
        font-family: var(--mono);
        font-size: 9px;
        color: var(--text-muted);
        letter-spacing: 0.1em;
        text-decoration: none;
        transition: color 0.2s;
      }

      .forgot:hover { color: var(--blue); }

      .remember {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 24px;
        cursor: pointer;
        user-select: none;
      }

      .remember input[type=checkbox] {
        display: none;
      }

      .checkbox-custom {
        width: 14px;
        height: 14px;
        border: 1px solid var(--border-bright);
        background: var(--bg);
        display: flex;
        align-items: center;
        justify-content: center;
        transition: border-color 0.2s, background 0.2s;
        flex-shrink: 0;
        padding: 0;
      }

      .remember input[type=checkbox]:checked ~ .checkbox-custom {
        border-color: var(--accent);
        background: var(--accent-dim);
      }

      .remember input[type=checkbox]:checked ~ .checkbox-custom::after {
        content: '';
        width: 6px;
        height: 6px;
        background: var(--accent);
      }

      .remember span {
        font-family: var(--mono);
        font-size: 9px;
        color: var(--text-muted);
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }

      .btn-signin {
        width: 100%;
        background: var(--accent);
        border: none;
        color: #fff;
        font-family: var(--mono);
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        padding: 15px;
        cursor: pointer;
        position: relative;
        overflow: hidden;
        transition: background 0.2s, transform 0.1s;
      }

      .btn-signin::before {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.1) 50%, transparent 100%);
        transform: translateX(-100%);
        transition: transform 0.4s;
      }

      .btn-signin:hover::before { transform: translateX(100%); }
      .btn-signin:hover { background: #ff6636; }
      .btn-signin:active { transform: scale(0.99); }

      .divider {
        display: flex;
        align-items: center;
        gap: 12px;
        margin: 20px 0;
      }

      .divider-line {
        flex: 1;
        height: 1px;
        background: var(--border);
      }

      .divider-text {
        font-family: var(--mono);
        font-size: 9px;
        color: var(--text-muted);
        letter-spacing: 0.1em;
      }

      .btn-sso {
        width: 100%;
        background: transparent;
        border: 1px solid var(--border-bright);
        color: var(--text-dim);
        font-family: var(--mono);
        font-size: 10px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        padding: 12px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        transition: border-color 0.2s, color 0.2s;
      }

      .btn-sso:hover {
        border-color: var(--blue);
        color: var(--blue);
      }

      .card-footer {
        padding: 16px 36px;
        border-top: 1px solid var(--border);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .clearance-badge {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .clearance-dot {
        width: 6px;
        height: 6px;
        background: #2ecf7e;
        border-radius: 50%;
        animation: pulse 2s ease-in-out infinite;
        box-shadow: 0 0 6px #2ecf7e;
      }

      @keyframes pulse {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.5; transform: scale(0.8); }
      }

      .clearance-text {
        font-family: var(--mono);
        font-size: 9px;
        color: var(--text-muted);
        letter-spacing: 0.1em;
      }

      .version {
        font-family: var(--mono);
        font-size: 9px;
        color: var(--border-bright);
        letter-spacing: 0.1em;
      }

      /* Bottom bar */
      .bottom-bar {
        grid-column: 1;
        grid-row: 2;
        border-top: 1px solid var(--border);
        display: flex;
        align-items: center;
        padding: 0 24px;
        gap: 24px;
      }

      .bottom-item {
        font-family: var(--mono);
        font-size: 9px;
        color: var(--text-muted);
        letter-spacing: 0.1em;
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .bottom-item::before {
        content: '';
        width: 4px;
        height: 4px;
        background: var(--border-bright);
      }

      .bottom-item:first-child::before { display: none; }

      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(16px); }
        to { opacity: 1; transform: translateY(0); }
      }


    </style>
  </head>
  <body>
    <div class="bg-grid"></div>
    <div class="scanlines"></div>
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>


    <div class="page">
      <!-- Center sign-in -->
      <div class="center-card">
        <div class="card">
          <div class="card-body">
            <div class="field">
              <label>Operator ID / Email</label>
              <div class="input-wrap">
                <input type="email" placeholder="operator@agency.gov" autocomplete="email" />
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="3" y="5" width="18" height="14" rx="2"/><polyline points="3,5 12,13 21,5"/>
                </svg>
              </div>
            </div>

            <div class="field">
              <div class="field-row">
                <label>Access Code</label>
                <a href="#" class="forgot">Reset code →</a>
              </div>
              <div class="input-wrap">
                <input type="password" placeholder="••••••••••••" autocomplete="current-password" />
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                </svg>
              </div>
            </div>

            <label class="remember">
              <input type="checkbox" />
              <div class="checkbox-custom"></div>
              <span>Keep me signed in on this terminal</span>
            </label>

            <button class="btn-signin">Authenticate →</button>

            <div class="divider">
              <div class="divider-line"></div>
              <div class="divider-text">or</div>
              <div class="divider-line"></div>
            </div>

            <button class="btn-sso">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
              </svg>
              Continue with Agency SSO
            </button>
          </div>

          <div class="card-footer">
            <div class="clearance-badge">
              <div class="clearance-dot"></div>
              <div class="clearance-text">Secure connection verified</div>
            </div>
            <div class="version">v4.1.2 — FEMA-CERT</div>
          </div>
        </div>
      </div>

      <!-- Bottom bar -->
      <div class="bottom-bar">
        <div class="bottom-item">DisasterSight Platform</div>
        <div class="bottom-item">FEMA Certified</div>
        <div class="bottom-item">AES-256 Encrypted</div>
        <div class="bottom-item">SOC 2 Type II</div>
        <div class="bottom-item">Privacy Policy</div>
        <div class="bottom-item">Terms of Use</div>
      </div>
    </div>


  </body>
</html>
